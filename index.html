<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Daily Tasks</title>
    <style>
        :root {
            --bg-default: #f6f8fa;
            --bg-active: #87CEEB; 
            --toggle-on: #007bff;
            --toggle-off: #afb8c1;
        }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-default);
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100dvh;
            transition: background-color 0.5s ease;
        }

        body.is-complete { background-color: var(--bg-active); }

        /* 上部の余白を大きく取り、コンテンツを下に押し下げる */
        .spacer { flex-grow: 1; }

        .container { 
            background: white; 
            padding: 24px 24px 30px 24px;
            border-radius: 32px 32px 0 0; /* 角丸を少し強調 */
            box-shadow: 0 -5px 25px rgba(0,0,0,0.08);
            max-width: 600px;
            margin: 0 auto;
            width: 100%;
            box-sizing: border-box;
        }

        /* タイトル等も控えめにして下に寄せる */
        .header-area { text-align: center; margin-bottom: 20px; }
        h1 { font-size: 1.2rem; margin: 0 0 4px 0; color: #333; }
        .date { color: #656d76; font-size: 0.85rem; }
        
        /* 親指が届きやすい位置のメモ欄 */
        .memo-in-container { margin-bottom: 15px; }
        #persistent-memo {
            width: 100%;
            height: 90px;
            padding: 12px;
            border: 1px solid #e1e4e8;
            border-radius: 14px;
            font-size: 1rem;
            resize: none;
            box-sizing: border-box;
            background: #f8f9fa;
            font-family: inherit;
        }

        .task-item { display: flex; align-items: center; justify-content: space-between; padding: 16px 0; border-bottom: 1px solid #f0f0f0; }
        .task-label { font-size: 1.1rem; font-weight: 600; flex-grow: 1; }

        .switch { position: relative; display: inline-block; width: 60px; height: 34px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: var(--toggle-off); transition: .3s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 26px; width: 26px; left: 4px; bottom: 4px; background-color: white; transition: .3s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--toggle-on); }
        input:checked + .slider:before { transform: translateX(26px); }

        /* 履歴ボタンも押しやすい位置に */
        .btn-history {
            display: block;
            margin: 25px auto 5px;
            padding: 12px 24px;
            background: #f0f2f5;
            border: none;
            border-radius: 25px;
            color: #555;
            font-size: 0.85rem;
            font-weight: 500;
        }

        /* 履歴パネル（下からスライド） */
        #history-panel {
            position: fixed;
            bottom: -100%;
            left: 0;
            right: 0;
            background: #fff;
            height: 80vh;
            max-width: 600px;
            margin: 0 auto;
            transition: bottom 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 100;
            border-radius: 24px 24px 0 0;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.2);
            padding: 24px;
            display: flex;
            flex-direction: column;
        }
        #history-panel.open { bottom: 0; }
        .history-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .history-content { overflow-y: auto; flex-grow: 1; }
        .history-row { display: flex; justify-content: space-between; padding: 14px 0; border-bottom: 1px solid #f5f5f5; }

        .congrats { text-align: center; color: #007bff; font-weight: bold; min-height: 1.4rem; margin-bottom: 5px; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="spacer"></div> <div class="container">
    <div id="congrats-msg" class="congrats"></div>
    
    <div class="header-area">
        <h1 id="title">Daily Tasks</h1>
        <div id="date-display" class="date"></div>
    </div>
    
    <div class="memo-in-container">
        <textarea id="persistent-memo" placeholder="今日のメモ・記録..."></textarea>
    </div>

    <div id="task-list"></div>

    <button class="btn-history" onclick="toggleHistory(true)">履歴を確認する</button>
</div>

<div id="history-panel">
    <div class="history-header">
        <span style="font-weight: bold; font-size: 1.1rem;">過去30日の記録</span>
        <button onclick="toggleHistory(false)" style="border:none; background:none; font-size:1.8rem; color:#ccc; padding:0 10px;">×</button>
    </div>
    <div class="history-content" id="history-list"></div>
</div>

<script>
    const TASKS = ["シダキュア", "電気", "エアコン", "社員証/社用携帯", "鍵"];
    const today = new Date().toLocaleDateString('sv-SE'); 

    function init() {
        document.getElementById('date-display').innerText = `${today.replace(/-/g, '/')}`;
        const memo = document.getElementById('persistent-memo');
        memo.value = localStorage.getItem('persistent_memo') || "";
        memo.addEventListener('input', (e) => localStorage.setItem('persistent_memo', e.target.value));

        const savedDate = localStorage.getItem('last_visit_date');
        if (savedDate && savedDate !== today) {
            saveToHistory(savedDate);
            localStorage.removeItem('checked_tasks');
        }
        localStorage.setItem('last_visit_date', today);
        renderTasks();
    }

    function saveToHistory(date) {
        const checkedTasks = JSON.parse(localStorage.getItem('checked_tasks')) || {};
        const history = JSON.parse(localStorage.getItem('task_history')) || {};
        history[date] = checkedTasks;
        const keys = Object.keys(history).sort().reverse();
        const filtered = {};
        keys.slice(0, 30).forEach(k => filtered[k] = history[k]);
        localStorage.setItem('task_history', JSON.stringify(filtered));
    }

    function renderTasks() {
        const taskList = document.getElementById('task-list');
        const checkedTasks = JSON.parse(localStorage.getItem('checked_tasks')) || {};
        taskList.innerHTML = '';
        let count = 0;
        TASKS.forEach(task => {
            if (checkedTasks[task]) count++;
            const item = document.createElement('div');
            item.className = 'task-item';
            item.innerHTML = `
                <span class="task-label">${task}</span>
                <label class="switch">
                    <input type="checkbox" ${checkedTasks[task] ? 'checked' : ''} onchange="handleToggle(event, '${task}')">
                    <span class="slider"></span>
                </label>
            `;
            taskList.appendChild(item);
        });
        const isAllDone = count === TASKS.length;
        document.body.classList.toggle('is-complete', isAllDone);
        document.getElementById('congrats-msg').innerText = isAllDone ? "✨ 全て完了！ゆっくり休みましょう ✨" : "";
    }

    window.toggleHistory = function(show) {
        const panel = document.getElementById('history-panel');
        if (show) { renderHistoryList(); panel.classList.add('open'); }
        else { panel.classList.remove('open'); }
    }

    function renderHistoryList() {
        const history = JSON.parse(localStorage.getItem('task_history')) || {};
        const list = document.getElementById('history-list');
        const dates = Object.keys(history).sort().reverse();
        if (dates.length === 0) {
            list.innerHTML = '<div style="text-align:center; color:#ccc; margin-top:40px;">履歴はまだありません</div>';
            return;
        }
        list.innerHTML = dates.map(date => {
            const data = history[date];
            const marks = TASKS.map(t => data[t] ? '●' : '×').join('');
            const doneCount = TASKS.filter(t => data[t]).length;
            return `
                <div class="history-row">
                    <span style="font-weight:600; color:#555;">${date.slice(5).replace('-', '/')}</span>
                    <span style="letter-spacing:4px; color:#007bff; font-family:monospace; font-size:1.1rem;">${marks}</span>
                    <span style="color:${doneCount===4?'#007bff':'#ccc'}; font-size:0.85rem;">${doneCount}/4</span>
                </div>
            `;
        }).join('');
    }

    window.handleToggle = function(event, task) {
        if (!event.target.checked && !confirm(`「${task}」をオフに戻しますか？`)) {
            event.target.checked = true; return;
        }
        let checkedTasks = JSON.parse(localStorage.getItem('checked_tasks')) || {};
        checkedTasks[task] = event.target.checked;
        localStorage.setItem('checked_tasks', JSON.stringify(checkedTasks));
        renderTasks();
    };

    init();
</script>
</body>
</html>
