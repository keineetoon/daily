<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>毎日チェックリスト</title>
    <style>
        body { font-family: sans-serif; background-color: #f0f2f5; padding: 20px; }
        .container { max-width: 400px; margin: 0 auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { text-align: center; font-size: 1.2rem; color: #333; }
        .date { text-align: center; color: #666; margin-bottom: 20px; font-size: 0.9rem; }
        .task-item { display: flex; align-items: center; padding: 15px; border-bottom: 1px solid #eee; cursor: pointer; }
        .task-item:last-child { border-bottom: none; }
        input[type="checkbox"] { width: 25px; height: 25px; margin-right: 15px; cursor: pointer; }
        span { font-size: 1.1rem; }
        .completed span { text-decoration: line-through; color: #888; }
    </style>
</head>
<body>

<div class="container">
    <h1 id="title">毎日チェックリスト</h1>
    <div id="date-display" class="date"></div>
    <div id="task-list">
        </div>
</div>

<script>
    // --- 【後で変更したい場合はここを書き換える】 ---
    const TASKS = ["シダキュア", "電気", "エアコン", "鍵"];
    // ------------------------------------------

    const dateDisplay = document.getElementById('date-display');
    const taskListElement = document.getElementById('task-list');

    // 今日が何日か取得 (YYYY-MM-DD)
    const today = new Date().toLocaleDateString('sv-SE'); 

    function init() {
        dateDisplay.innerText = `${today} のタスク`;

        // 保存された日付を確認
        const savedDate = localStorage.getItem('last_visit_date');

        // もし保存された日付が今日と違う（＝次の日になった）ならデータを消す
        if (savedDate !== today) {
            localStorage.removeItem('checked_tasks');
            localStorage.setItem('last_visit_date', today);
        }

        renderTasks();
    }

    function renderTasks() {
        const checkedTasks = JSON.parse(localStorage.getItem('checked_tasks')) || {};
        taskListElement.innerHTML = '';

        TASKS.forEach(task => {
            const isChecked = checkedTasks[task] || false;
            const div = document.createElement('div');
            div.className = `task-item ${isChecked ? 'completed' : ''}`;
            div.innerHTML = `
                <input type="checkbox" ${isChecked ? 'checked' : ''} onchange="toggleTask('${task}')">
                <span>${task}</span>
            `;
            div.onclick = (e) => {
                if(e.target.tagName !== 'INPUT') {
                    toggleTask(task);
                }
            };
            taskListElement.appendChild(div);
        });
    }

    window.toggleTask = function(task) {
        let checkedTasks = JSON.parse(localStorage.getItem('checked_tasks')) || {};
        checkedTasks[task] = !checkedTasks[task];
        localStorage.setItem('checked_tasks', JSON.stringify(checkedTasks));
        renderTasks();
    };

    init();
</script>

</body>
</html>
