<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Daily Tasks</title>
    <style>
        :root {
            --bg-default: #f6f8fa;
            --bg-active: #87CEEB; /* スカイブルーに変更 */
            --toggle-on: #007bff;
            --toggle-off: #afb8c1;
        }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-default);
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100dvh;
            transition: background-color 0.5s ease; /* 少しゆっくり色が変わるように */
        }

        /* 4つ全部チェックされた時の背景 */
        body.is-complete {
            background-color: var(--bg-active);
        }

        .memo-container {
            padding: 15px;
            max-width: 600px;
            width: 100%;
            margin: 0 auto;
            box-sizing: border-box;
        }
        #persistent-memo {
            width: 100%;
            height: 80px;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 12px;
            font-size: 0.9rem;
            resize: none;
            box-sizing: border-box;
            background: #fff;
        }

        .spacer { flex-grow: 1; }

        .container { 
            background: white; 
            padding: 24px 24px 40px 24px;
            border-radius: 24px 24px 0 0;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.1);
            max-width: 600px;
            margin: 0 auto;
            width: 100%;
            box-sizing: border-box;
        }

        h1 { font-size: 1.4rem; margin-bottom: 4px; text-align: center; }
        .date { text-align: center; color: #656d76; margin-bottom: 24px; font-size: 0.9rem; }
        .task-item { display: flex; align-items: center; justify-content: space-between; padding: 20px 0; border-bottom: 1px solid #eee; }
        .task-item:last-child { border-bottom: none; }
        .task-label { font-size: 1.2rem; font-weight: 600; flex-grow: 1; }

        .switch { position: relative; display: inline-block; width: 60px; height: 34px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: var(--toggle-off); transition: .3s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 26px; width: 26px; left: 4px; bottom: 4px; background-color: white; transition: .3s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--toggle-on); }
        input:checked + .slider:before { transform: translateX(26px); }

        .history-section {
            margin-top: 20px;
            font-size: 0.8rem;
            color: #888;
            border-top: 1px dashed #ddd;
            padding-top: 15px;
        }
        .history-item { margin-bottom: 4px; }
    </style>
</head>
<body>

<div class="memo-container">
    <textarea id="persistent-memo" placeholder="消えないメモ欄..."></textarea>
</div>

<div class="spacer"></div>

<div class="container">
    <h1 id="title">Daily Tasks</h1>
    <div id="date-display" class="date"></div>
    <div id="task-list"></div>
    <div id="history-list" class="history-section"></div>
</div>

<script>
    const TASKS = ["シダキュア", "電気", "エアコン", "鍵"];
    const dateDisplay = document.getElementById('date-display');
    const taskListElement = document.getElementById('task-list');
    const memoElement = document.getElementById('persistent-memo');
    const historyElement = document.getElementById('history-list');
    const today = new Date().toLocaleDateString('sv-SE'); 

    function init() {
        dateDisplay.innerText = `${today.replace(/-/g, '/')}`;
        memoElement.value = localStorage.getItem('persistent_memo') || "";
        memoElement.addEventListener('input', (e) => {
            localStorage.setItem('persistent_memo', e.target.value);
        });

        const savedDate = localStorage.getItem('last_visit_date');
        if (savedDate && savedDate !== today) {
            saveCurrentToHistory(savedDate);
            localStorage.removeItem('checked_tasks');
        }
        localStorage.setItem('last_visit_date', today);

        renderTasks();
        renderHistory();
    }

    function saveCurrentToHistory(date) {
        const checkedTasks = JSON.parse(localStorage.getItem('checked_tasks')) || {};
        const history = JSON.parse(localStorage.getItem('task_history')) || {};
        history[date] = checkedTasks;
        const keys = Object.keys(history).sort().reverse();
        const filteredHistory = {};
        keys.slice(0, 7).forEach(k => filteredHistory[k] = history[k]);
        localStorage.setItem('task_history', JSON.stringify(filteredHistory));
    }

    function renderTasks() {
        const checkedTasks = JSON.parse(localStorage.getItem('checked_tasks')) || {};
        taskListElement.innerHTML = '';
        
        // 全てチェックされているか確認するためのカウンタ
        let checkedCount = 0;

        TASKS.forEach(task => {
            const isChecked = checkedTasks[task] || false;
            if (isChecked) checkedCount++;

            const item = document.createElement('div');
            item.className = 'task-item';
            item.innerHTML = `
                <span class="task-label">${task}</span>
                <label class="switch">
                    <input type="checkbox" ${isChecked ? 'checked' : ''} onchange="handleToggle(event, '${task}')">
                    <span class="slider"></span>
                </label>
            `;
            taskListElement.appendChild(item);
        });

        // 全てのタスク（TASKS.length）がチェックされていたらクラスを付与
        const isAllComplete = checkedCount === TASKS.length;
        document.body.classList.toggle('is-complete', isAllComplete);
    }

    function renderHistory() {
        const history = JSON.parse(localStorage.getItem('task_history')) || {};
        const dates = Object.keys(history).sort().reverse();
        if (dates.length === 0) return;

        let html = '<div style="margin-bottom:8px; font-weight:bold;">過去の履歴</div>';
        dates.forEach(date => {
            const data = history[date];
            const status = TASKS.map(t => data[t] ? '●' : '×').join(' ');
            html += `<div class="history-item">${date.replace(/^\d{4}-/, '')}: ${status}</div>`;
        });
        historyElement.innerHTML = html;
    }

    window.handleToggle = function(event, task) {
        const isCurrentlyChecked = event.target.checked;
        let checkedTasks = JSON.parse(localStorage.getItem('checked_tasks')) || {};

        if (!isCurrentlyChecked) {
            const confirmOff = confirm(`「${task}」をオフに戻しますか？`);
            if (!confirmOff) {
                event.target.checked = true;
                return;
            }
        }

        checkedTasks[task] = isCurrentlyChecked;
        localStorage.setItem('checked_tasks', JSON.stringify(checkedTasks));
        renderTasks();
    };

    init();
</script>

</body>
</html>
